<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>พลู - บันทึกแต้ม</title>
<style>
  :root{
    --bg:#0f1720; --card:#172230; --card2:#1f2d3d; --line:#2b3a4d;
    --txt:#e8eef5; --muted:#90a2b6; --accent:#22c55e; --accent2:#3b82f6;
    --warn:#f59e0b; --danger:#ef4444; --gold:#eab308;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;background:var(--bg);color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",sans-serif;
    line-height:1.5;padding:0 0 40px}
  .wrap{max-width:560px;margin:0 auto;padding:16px}
  h1{font-size:22px;margin:6px 0 2px;text-align:center}
  .sub{color:var(--muted);text-align:center;font-size:13px;margin-bottom:16px}
  h2{font-size:17px;margin:18px 0 8px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:14px}
  label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px}
  input[type=number],input[type=text]{width:100%;padding:12px;border-radius:10px;border:1px solid var(--line);
    background:var(--card2);color:var(--txt);font-size:16px;outline:none}
  input:focus{border-color:var(--accent2)}
  button{font-family:inherit;font-size:15px;border:none;border-radius:10px;padding:12px 14px;
    background:var(--card2);color:var(--txt);cursor:pointer}
  button:active{transform:scale(.98)}
  .btn-primary{background:var(--accent);color:#06210f;font-weight:700;width:100%}
  .btn-blue{background:var(--accent2);color:#fff;font-weight:600}
  .btn-ghost{background:transparent;border:1px solid var(--line);color:var(--muted)}
  .btn-danger{background:transparent;border:1px solid var(--danger);color:var(--danger)}
  .row{display:flex;gap:8px;flex-wrap:wrap}
  .chip{padding:8px 12px;border-radius:999px;border:1px solid var(--line);background:var(--card2);
    font-size:14px;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
  .chip.on{background:var(--accent);color:#06210f;border-color:var(--accent);font-weight:700}
  .chip .x{opacity:.6;font-size:12px}
  .hint{font-size:12px;color:var(--muted);margin-top:6px}
  .err{color:var(--danger);font-size:13px;margin-top:8px;min-height:18px}
  .grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
  .ball{aspect-ratio:1;border-radius:50%;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;
    cursor:pointer;user-select:none;background:#888;
    box-shadow:inset -3px -5px 9px rgba(0,0,0,.5), inset 4px 4px 8px rgba(255,255,255,.25), 0 2px 5px rgba(0,0,0,.45)}
  .ball.stripe{background:#f0efe6}
  .ball .band{position:absolute;left:0;right:0;top:20%;bottom:20%;z-index:1}
  .ball .shine{position:absolute;top:11%;left:17%;width:36%;height:28%;border-radius:50%;z-index:2;pointer-events:none;
    background:radial-gradient(circle at 35% 35%, rgba(255,255,255,.92), rgba(255,255,255,0) 70%)}
  .ball .num{position:relative;z-index:3;width:54%;height:54%;border-radius:50%;background:#fff;color:#111;
    display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;box-shadow:0 1px 2px rgba(0,0,0,.3)}
  .reveal-balls{display:flex;flex-wrap:wrap;gap:14px;justify-content:center;margin:10px 0}
  .reveal-balls .ball{width:72px;height:72px;cursor:default}
  .reveal-balls .ball .num{font-size:26px}
  .ball.shot{opacity:.3;cursor:default}
  .ball.shot .num{text-decoration:line-through}
  .ball.special{outline:3px solid var(--gold);outline-offset:-3px}
  .ball.owned-rev{outline:3px solid var(--accent);outline-offset:-3px}
  .ball.decoy-rev{outline:3px solid var(--muted);outline-offset:-3px}
  .lo-banner{border:1px solid var(--gold);background:linear-gradient(180deg,rgba(234,179,8,.18),rgba(234,179,8,.06))}
  .lo-banner .t{font-weight:800;color:var(--gold)}
  .lo-ov{animation:loFade .4s ease-out;background:radial-gradient(circle at 50% 38%,rgba(234,179,8,.28),rgba(0,0,0,.9) 70%)}
  @keyframes loFade{from{opacity:0}to{opacity:1}}
  .lo-ovbox{position:relative;overflow:hidden;border:2px solid var(--gold);
    background:linear-gradient(165deg,#2a2410,#1a1a24 55%,#241c0c);
    box-shadow:0 0 0 1px rgba(234,179,8,.4),0 0 40px rgba(234,179,8,.45);
    animation:loPop .55s cubic-bezier(.18,1.5,.4,1),loGlow 1.8s ease-in-out .55s infinite}
  @keyframes loPop{0%{transform:scale(.4) rotate(-6deg);opacity:0}60%{transform:scale(1.06) rotate(1deg)}100%{transform:scale(1) rotate(0)}}
  @keyframes loGlow{0%,100%{box-shadow:0 0 0 1px rgba(234,179,8,.4),0 0 30px rgba(234,179,8,.35)}50%{box-shadow:0 0 0 1px rgba(234,179,8,.7),0 0 55px rgba(234,179,8,.7)}}
  /* แถบแสงวิ่งผ่านกล่อง */
  .lo-ovbox::before{content:"";position:absolute;top:0;left:-60%;width:50%;height:100%;
    background:linear-gradient(100deg,transparent,rgba(255,255,255,.18),transparent);
    transform:skewX(-20deg);animation:loSheen 2.6s ease-in-out 1s infinite}
  @keyframes loSheen{0%{left:-60%}45%,100%{left:130%}}
  .lo-coin{font-size:64px;display:inline-block;animation:loCoin 1.4s ease-in-out infinite;filter:drop-shadow(0 4px 10px rgba(234,179,8,.6))}
  @keyframes loCoin{0%,100%{transform:translateY(0) rotateY(0)}50%{transform:translateY(-8px) rotateY(180deg)}}
  .lo-ovbox h2{margin:6px 0 10px;background:linear-gradient(90deg,#fff3c4,#eab308,#fff3c4,#eab308);
    background-size:250% auto;-webkit-background-clip:text;background-clip:text;color:transparent;
    font-weight:900;letter-spacing:.5px;animation:loShine 2.4s linear infinite}
  @keyframes loShine{to{background-position:250% center}}
  .lo-list{text-align:left;margin:2px 0 16px}
  .lo-row{display:flex;justify-content:space-between;align-items:center;
    background:linear-gradient(180deg,rgba(234,179,8,.1),rgba(255,255,255,.02));
    border:1px solid rgba(234,179,8,.35);border-radius:10px;padding:10px 13px;margin-bottom:7px;font-size:15px;
    opacity:0;animation:loRow .45s ease-out forwards}
  @keyframes loRow{from{opacity:0;transform:translateX(-14px)}to{opacity:1;transform:translateX(0)}}
  .lo-row b{font-size:18px;text-shadow:0 0 8px currentColor}
  .lo-row .pos{color:var(--accent)} .lo-row .neg{color:var(--danger)} .lo-row .zero{color:var(--muted)}
  /* confetti */
  .confetti{position:fixed;top:-12px;width:9px;height:14px;z-index:1001;pointer-events:none;
    animation:confFall linear forwards}
  @keyframes confFall{to{transform:translateY(108vh) rotate(720deg);opacity:.9}}
  /* popup ผลการยิงทุกครั้ง */
  .shot-ov{background:rgba(0,0,0,.72);animation:loFade .2s ease-out}
  .shot-box{max-width:320px;border-width:2px;animation:loPop .38s cubic-bezier(.18,1.5,.4,1)}
  .big-ball{width:96px;height:96px;margin:2px auto 14px;cursor:default}
  .big-ball .num{font-size:30px}
  .shot-who{color:var(--muted);font-size:14px;margin-bottom:8px}
  .shot-kind{font-size:23px;font-weight:900;margin-bottom:4px}
  .shot-pts{font-size:16px;font-weight:700;margin-bottom:6px}
  .shot-pass{font-size:13px;color:var(--muted);margin-bottom:14px}
  .k-own .shot-box{border-color:var(--accent)} .k-own .shot-kind,.k-own .shot-pts{color:var(--accent)}
  .k-steal .shot-box{border-color:var(--gold)} .k-steal .shot-kind,.k-steal .shot-pts{color:var(--gold)}
  .k-special .shot-box{border-color:#a855f7} .k-special .shot-kind,.k-special .shot-pts{color:#c084fc}
  .k-decoy .shot-box{border-color:var(--muted)} .k-decoy .shot-kind,.k-decoy .shot-pts{color:var(--muted)}
  .k-scratch .shot-box{border-color:var(--danger)} .k-scratch .shot-kind,.k-scratch .shot-pts{color:var(--danger)}
  .ball.cue{background:radial-gradient(circle at 38% 32%,#ffffff,#d8d8d8 75%,#bdbdbd)}
  .center{text-align:center}
  .big{font-size:20px;font-weight:700}
  .reveal{padding:12px;border-radius:10px;background:var(--card2);margin:12px 0;text-align:center;min-height:24px}
  table{width:100%;border-collapse:collapse;font-size:14px}
  th,td{padding:8px 6px;border-bottom:1px solid var(--line);text-align:center}
  th{color:var(--muted);font-weight:600}
  .sortcol{color:var(--accent2);font-weight:700}
  #muteBtn{position:fixed;top:12px;right:12px;z-index:50;width:42px;height:42px;border-radius:50%;
    border:1px solid var(--line);background:var(--card2);color:#fff;font-size:19px;cursor:pointer;
    box-shadow:0 2px 8px rgba(0,0,0,.35);opacity:.85}
  #muteBtn:hover{opacity:1}
  #muteBtn.off{opacity:.5}
  .pos{color:var(--accent);font-weight:700}
  .neg{color:var(--danger);font-weight:700}
  .gate{text-align:center;padding:30px 10px}
  .gate .name{font-size:26px;font-weight:800;margin:10px 0;color:var(--accent)}
  .log{font-size:13px;color:var(--muted);max-height:240px;overflow:auto}
  .logsec{margin-bottom:12px}
  .logsec-h{font-size:12px;font-weight:700;padding:6px 9px;border-radius:8px;margin-bottom:5px}
  .logsec-h.shoot{background:rgba(34,197,94,.16);color:var(--accent)}
  .logsec-h.left{background:rgba(234,179,8,.16);color:var(--gold)}
  .logline{font-size:13px;padding:6px 9px;border-left:3px solid var(--line);margin-bottom:3px;color:var(--txt)}
  .logline.shoot{border-left-color:var(--accent)}
  .logline.left{border-left-color:var(--gold);color:#f3e2a6}
  .logline.lead{font-weight:700;background:rgba(234,179,8,.12)}
  .logline.miss{border-left-color:var(--muted);color:var(--muted)}
  .logline.foul{border-left-color:var(--danger);color:#f7a7a7}
  .foul-btn{color:#f7a7a7;border-color:rgba(239,68,68,.4)}
  .seg{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
  .seg button{flex:1;min-width:60px}
  .seg button.on{background:var(--accent2);color:#fff}
  .pill{display:inline-block;padding:2px 8px;border-radius:6px;background:var(--card2);font-size:12px;margin-left:6px}
  .muted{color:var(--muted)}
  .spacer{height:6px}
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);display:flex;align-items:center;
    justify-content:center;z-index:1000;padding:20px;animation:flash .45s ease-in-out 4}
  @keyframes flash{0%,100%{background:rgba(0,0,0,.82)}50%{background:rgba(239,68,68,.5)}}
  .overlay-box{background:var(--card);border:2px solid var(--danger);border-radius:16px;
    padding:26px 20px;text-align:center;max-width:420px;width:100%}
  .overlay-box h2{color:var(--danger);margin:6px 0 10px}
  .overlay-box p{color:var(--muted);font-size:15px;margin:0 0 18px}
  .overlay.invite{animation:none;background:rgba(0,0,0,.86)}
  .overlay-box.invite{border-color:var(--accent)}
  .overlay-box.invite h2{color:var(--accent)}
  .overlay-box.invite p{margin:0 0 12px}
  .qrbox{background:#fff;padding:12px;border-radius:12px;display:inline-block;margin:4px 0}
  .qrbox svg{width:220px;height:220px;display:block}
  /* ---- โหมดทีวี (จอใหญ่ แนวกว้าง ไม่ต้องเลื่อนจอ) ---- */
  body.tv{overflow:hidden;height:100vh}
  body.tv .wrap{max-width:none;width:100vw;height:100vh;box-sizing:border-box;padding:18px 22px;
    display:flex;flex-direction:column;margin:0}
  body.tv h1{font-size:26px;margin:0}
  body.tv .sub{font-size:15px;margin:2px 0 10px}
  body.tv #app{flex:1 1 auto;min-height:0;display:flex}
  body.tv #muteBtn{display:block;width:54px;height:54px;font-size:24px;top:16px;right:20px}

  body.tv .tv-stage{display:grid;gap:16px;width:100%;height:100%;min-height:0}
  body.tv .tv-stage.live{grid-template-columns:1.3fr 1fr}
  body.tv .tv-stage.full{grid-template-columns:1fr 1fr;place-content:stretch}
  body.tv .tv-col{display:flex;flex-direction:column;gap:14px;min-height:0;overflow:hidden}
  body.tv .tv-col .card{margin:0}
  body.tv .tv-col.fit .card{flex:1 1 0;min-height:0;overflow:hidden;display:flex;flex-direction:column}
  body.tv .tv-col.fit .card table{flex:1 1 auto}

  body.tv .card{padding:16px}
  body.tv #app .card h2{font-size:22px;margin:0 0 8px}
  body.tv #app table{font-size:20px;width:100%;line-height:1.2}
  body.tv #app table th,body.tv #app table td{padding:.22em .5em}
  /* ตารางฝั่งขวา (แต้มตานี้ + รอบนี้ แยกกัน) ปรับขนาดฟอนต์อัตโนมัติให้พอดีจอ
     เกมปกติฟอนต์ใหญ่เต็ม · เกมผู้เล่นเยอะ (สูงสุด 13 คน) ย่อให้พอดีไม่ต้องเลื่อน */
  body.tv .tv-col.fit{--tvfs:20px}
  body.tv .tv-col.fit .card{padding:12px}
  body.tv #app .tv-col.fit .card h2{font-size:clamp(14px,calc(var(--tvfs) + 1px),22px);margin:0 0 5px}
  body.tv #app .tv-col.fit .card table{font-size:var(--tvfs)}
  body.tv #app .tv-col.fit .card table th,body.tv #app .tv-col.fit .card table td{padding:.16em .5em}
  body.tv .pill{font-size:16px;padding:3px 12px}
  body.tv .muted{font-size:16px}
  body.tv .tv-name{font-size:48px;font-weight:800;color:var(--accent);margin:4px 0;line-height:1.05}
  body.tv .tv-order{font-size:18px;margin-top:6px;line-height:1.4}

  body.tv .tv-board{flex:1 1 auto;min-height:0;display:flex;flex-direction:column;overflow:hidden}
  body.tv .tv-board .grid{flex:0 0 auto;align-content:center;gap:8px;
    grid-template-columns:repeat(8,minmax(0,1fr));max-width:560px;margin:0 auto;width:100%}
  body.tv .tv-board .ball .num{font-size:20px}
  body.tv .tv-banner{flex:0 0 auto}
  body.tv .tv-col .card.tv-board{flex:0 0 auto}
  body.tv .tv-logcard{flex:1 1 auto;min-height:0;overflow:hidden;display:flex;flex-direction:column}
  body.tv .tv-logcard .log{flex:1 1 auto;min-height:6em;max-height:none;font-size:16px;line-height:1.5}
</style>
</head>
<body>
<div class="wrap">
  <h1>🎱 พลู — บันทึกแต้ม</h1>
  <div class="sub">ตั้งค่า → กรอกไพ่ลับ → ยิงลูก → สรุปแต้ม</div>
  <div id="app"></div>
</div>
<button id="muteBtn" title="เปิด/ปิดเสียง">🔊</button>

<!-- Firebase (cloud sync) -->
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
<!-- QR generator (สร้าง QR ฝั่งเครื่อง ไม่ส่งกุญแจออกไปไหน) -->
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js"></script>

<script>
"use strict";

/* สีลูกพลูจริง 1-15  (s=ลูกเดี่ยว, st=ลูกลาย/แถบ) */
const BALL=[null,
  {c:"#f4c20d",t:"s"},  // 1 เหลือง
  {c:"#1f4fd8",t:"s"},  // 2 น้ำเงิน
  {c:"#d62828",t:"s"},  // 3 แดง
  {c:"#6a2c91",t:"s"},  // 4 ม่วง
  {c:"#e8741e",t:"s"},  // 5 ส้ม
  {c:"#1e8c3a",t:"s"},  // 6 เขียว
  {c:"#7a1f2b",t:"s"},  // 7 แดงเลือดหมู
  {c:"#111111",t:"s"},  // 8 ดำ
  {c:"#f4c20d",t:"st"}, // 9 เหลืองลาย
  {c:"#1f4fd8",t:"st"}, // 10 น้ำเงินลาย
  {c:"#d62828",t:"st"}, // 11 แดงลาย
  {c:"#6a2c91",t:"st"}, // 12 ม่วงลาย
  {c:"#e8741e",t:"st"}, // 13 ส้มลาย
  {c:"#1e8c3a",t:"st"}, // 14 เขียวลาย
  {c:"#7a1f2b",t:"st"}  // 15 แดงเลือดหมูลาย
];

/* หน่วยแต้มต่อ 1 ลูก (คูณทุกแต้มด้วยค่านี้)
   เลขตัวเอง/พิเศษ = UNIT · แย่งเลขคนอื่น = UNIT×2 · ลูกขาว = เสีย UNIT · โบนัสลูกเหลือ = เลขละ UNIT×2 */
const UNIT=20;

/* ค่าต่อให้ (handicap) เริ่มต้นของผู้เล่นทั่วไป — ทุกแต้มยึด "ค่าของคนยิง" */
function defaultHC(){ return {own:UNIT, special:UNIT, steal:UNIT*2, scratch:UNIT, leftover:UNIT*2, contLimit:null}; }
function isCustomHC(hc){ return !!hc && (hc.own!==UNIT || hc.special!==UNIT || hc.steal!==UNIT*2 || hc.scratch!==UNIT || hc.leftover!==UNIT*2 || hc.contLimit); }

/* ---------------- storage (localStorage + in-memory fallback) ----------------
   3 ส่วน: รายชื่อผู้เล่น / ประวัติรอบนี้ (session) / Hall of Fame (lifetime) */
const K_NAMES="pool_names_v1", K_SES="pool_session_v1", K_HOF="pool_hof_v1";
const _mem={}; let useMem=false;
(function probe(){ try{ localStorage.setItem("__p__","1"); localStorage.removeItem("__p__"); }catch(e){ useMem=true; } })();
function lsGet(key, def){
  if(useMem) return (key in _mem)? _mem[key] : def;
  try{ const v=localStorage.getItem(key); return v? JSON.parse(v) : def; }
  catch(e){ useMem=true; return (key in _mem)? _mem[key] : def; }
}
function lsSet(key, val){
  if(useMem){ _mem[key]=val; return; }
  try{ localStorage.setItem(key, JSON.stringify(val)); }
  catch(e){ useMem=true; _mem[key]=val; }
}
function fmtDate(iso){ if(!iso) return "-"; try{ return new Date(iso).toLocaleString('th-TH',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}); }catch(e){ return iso; } }

/* รายชื่อผู้เล่น (+ ย้ายข้อมูลจาก key เก่าครั้งเดียว) */
function loadNames(){
  let names=lsGet(K_NAMES, null);
  if(!names){
    const old=lsGet("pool_players_v1", null);
    names = old? old.map(p=>p.name) : [];
    lsSet(K_NAMES, names);
  }
  return names;
}
function saveNames(arr){ lsSet(K_NAMES, arr); cloudPush(); }
function ensureName(name){ const a=loadNames(); if(!a.includes(name)){ a.push(name); saveNames(a);} }
function hasName(name){ return loadNames().includes(name); }

/* ประวัติรอบนี้ (session: หลายตาในวงเดียว) */
function blankSession(){ return {players:{}, pairs:{}, started:new Date().toISOString()}; }
function loadSession(){ return lsGet(K_SES, blankSession()); }
function saveSession(s){ lsSet(K_SES, s); cloudPush(); }
function resetSession(){ lsSet(K_SES, blankSession()); cloudPush(); }

/* Hall of Fame (lifetime) */
function blankHOF(){ return {players:{}, since:new Date().toISOString()}; }
function blankPlayerHOF(){ return {played:0,wins:0,totalNet:0,bestRound:null,worstRound:null,
  curStreak:0,bestStreak:0,ownPots:0,stealPots:0,specialPots:0,decoyPots:0,leftoverWins:0,lastPlayed:null,
  scratches:0,misses:0,bestCombo:0,stolenFrom:0,closes:0,curLoseStreak:0,worstLoseStreak:0}; }
function loadHOF(){ return lsGet(K_HOF, blankHOF()); }
function saveHOF(h){ lsSet(K_HOF, h); cloudPush(); }
function resetHOF(){ lsSet(K_HOF, blankHOF()); cloudOverwrite(); }

function deletePlayer(name){
  saveNames(loadNames().filter(n=>n!==name));
  const s=loadSession(); delete s.players[name]; delete s.pairs[name];
  Object.keys(s.pairs).forEach(k=>{ if(s.pairs[k]) delete s.pairs[k][name]; });
  saveSession(s);
  const h=loadHOF(); delete h.players[name]; saveHOF(h);
}

/* เคลียร์เฉพาะ 1 คน (คนออกก่อนจบรอบ): นำยอดของคนนั้นออกจาก "รอบนี้" เท่านั้น
   — ไม่แตะรายชื่อผู้เล่นและ Hall of Fame — คนอื่นยอดสะสมยังครบ
   ใช้ cloudOverwrite เพื่อไม่ให้ merge ดึงยอดเดิมกลับ */
function cashOutPlayer(name){
  const s=loadSession();
  delete s.players[name];
  delete s.pairs[name];
  Object.keys(s.pairs).forEach(k=>{ if(s.pairs[k]) delete s.pairs[k][name]; });
  lsSet(K_SES, s);
  cloudOverwrite();
}

/* บันทึก 1 ตาที่จบแล้ว ลงทั้ง session และ HoF */
function recordRoundResult(results, pairDelta){
  const ses=loadSession(), hof=loadHOF();
  results.forEach(r=>{
    const s = ses.players[r.name] || (ses.players[r.name]={net:0,played:0,wins:0});
    s.net+=r.net; s.played++; if(r.win) s.wins++;
    const h = hof.players[r.name] || (hof.players[r.name]=blankPlayerHOF());
    h.played++; h.totalNet+=r.net; if(r.win) h.wins++;
    h.bestRound = h.bestRound==null? r.net : Math.max(h.bestRound, r.net);
    h.worstRound= h.worstRound==null? r.net : Math.min(h.worstRound, r.net);
    h.curStreak = r.win? h.curStreak+1 : 0;
    h.bestStreak= Math.max(h.bestStreak, h.curStreak);
    h.ownPots+=r.own; h.stealPots+=r.steal; h.specialPots+=r.special;
    h.decoyPots+=r.decoy; h.leftoverWins+=r.leftover;
    // สถิติลูกเล่น (guard ||0 กันข้อมูลเก่าที่ยังไม่มีฟิลด์)
    h.scratches=(h.scratches||0)+(r.scratches||0);
    h.misses=(h.misses||0)+(r.misses||0);
    h.bestCombo=Math.max(h.bestCombo||0, r.bestCombo||0);
    h.stolenFrom=(h.stolenFrom||0)+(r.victim||0);
    h.closes=(h.closes||0)+(r.closes||0);
    if((r.net||0)<0){ h.curLoseStreak=(h.curLoseStreak||0)+1; } else { h.curLoseStreak=0; }
    h.worstLoseStreak=Math.max(h.worstLoseStreak||0, h.curLoseStreak||0);
    h.lastPlayed=new Date().toISOString();
  });
  Object.keys(pairDelta).forEach(a=>{
    ses.pairs[a]=ses.pairs[a]||{};
    Object.keys(pairDelta[a]).forEach(b=>{ ses.pairs[a][b]=(ses.pairs[a][b]||0)+pairDelta[a][b]; });
  });
  saveSession(ses); saveHOF(hof);
}
function settlement(pairs){
  const names=Object.keys(pairs); const out=[];
  for(let i=0;i<names.length;i++)for(let j=i+1;j<names.length;j++){
    const a=names[i], b=names[j];
    const v=(pairs[a]&&pairs[a][b])||0;
    if(v>0) out.push({from:b,to:a,amt:v});
    else if(v<0) out.push({from:a,to:b,amt:-v});
  }
  return out.sort((x,y)=>y.amt-x.amt);
}

/* ---------------- multi-controller: identity + crypto ----------------
   หลายมือถือช่วยกันคุม "ตาที่กำลังเล่น" เดียวกันได้
   - สถานะเกมเต็ม (มีเลขลับของผู้เล่น) ถูกเข้ารหัส AES-GCM ก่อนส่งขึ้นคลาวด์
   - กุญแจถอดรหัสอยู่ใน QR ที่โชว์เฉพาะบนมือถือคนคุม (ไม่ขึ้นจอทีวีสาธารณะ)
   - ทีวี (?tv=1) อ่านแค่ field สาธารณะ (live) เหมือนเดิม ไม่แตะ game ที่เข้ารหัส */
let _clientId = (function(){
  try{
    let id=sessionStorage.getItem("pool_client");
    if(!id){ id=Math.random().toString(36).slice(2)+Date.now().toString(36); sessionStorage.setItem("pool_client", id); }
    return id;
  }catch(e){ return Math.random().toString(36).slice(2); }
})();
const _subtle = (window.crypto && window.crypto.subtle) ? window.crypto.subtle : null;
function _b64FromBytes(bytes){ let s=""; bytes.forEach(b=>s+=String.fromCharCode(b)); return btoa(s); }
function _bytesFromB64(b64){ const s=atob(b64); const a=new Uint8Array(s.length); for(let i=0;i<s.length;i++)a[i]=s.charCodeAt(i); return a; }
function _b64url(b64){ return b64.replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,""); }
function _b64urlBack(s){ s=s.replace(/-/g,"+").replace(/_/g,"/"); while(s.length%4)s+="="; return s; }
async function genGameKey(){ return _subtle.generateKey({name:"AES-GCM",length:256},true,["encrypt","decrypt"]); }
async function exportGameKey(key){ const raw=await _subtle.exportKey("raw",key); return _b64url(_b64FromBytes(new Uint8Array(raw))); }
async function importGameKey(b64){ return _subtle.importKey("raw",_bytesFromB64(_b64urlBack(b64)),{name:"AES-GCM"},true,["encrypt","decrypt"]); }
async function encryptJSON(key,obj){
  const iv=window.crypto.getRandomValues(new Uint8Array(12));
  const data=new TextEncoder().encode(JSON.stringify(obj));
  const ct=await _subtle.encrypt({name:"AES-GCM",iv},key,data);
  return { iv:_b64FromBytes(iv), ct:_b64FromBytes(new Uint8Array(ct)) };
}
async function decryptJSON(key,enc){
  const iv=_bytesFromB64(enc.iv), ct=_bytesFromB64(enc.ct);
  const pt=await _subtle.decrypt({name:"AES-GCM",iv},key,ct);
  return JSON.parse(new TextDecoder().decode(pt));
}

function cloudInit(){
  try{
    if(typeof firebase==="undefined") return false;
    firebase.initializeApp(firebaseConfig);
    _db=firebase.firestore();
    _cloudDoc=_db.collection(CLOUD_COL).doc(CLOUD_DOC);
    _cloudOK=true;
    return true;
  }catch(e){ console.warn("Firebase init failed", e); _cloudOK=false; return false; }
}

function localSnapshot(){ return { names:loadNames(), session:loadSession(), hof:loadHOF() }; }
function isEmptyData(d){
  if(!d) return true;
  const noNames=!d.names || !d.names.length;
  const noHof=!d.hof || !d.hof.players || !Object.keys(d.hof.players).length;
  return noNames && noHof;
}
function mergeNames(a,b){
  const out=[...(a||[])];
  (b||[]).forEach(n=>{ if(!out.includes(n)) out.push(n); });
  return out;
}
function mergeHOF(a,b){
  a=a||blankHOF(); b=b||blankHOF();
  const since=(a.since&&b.since)?(a.since<b.since?a.since:b.since):(a.since||b.since||new Date().toISOString());
  const out={players:{}, since};
  const names=new Set([...Object.keys(a.players||{}), ...Object.keys(b.players||{})]);
  names.forEach(n=>{
    const pa=(a.players||{})[n], pb=(b.players||{})[n];
    if(pa&&pb) out.players[n]=((pb.played||0)>(pa.played||0))?pb:pa; // เก็บสถิติที่เล่นมามากกว่า (กันสถิติถอยหลัง)
    else out.players[n]=pa||pb;
  });
  return out;
}
function mergeSession(a,b){
  if(!a||!a.started) return b||blankSession();
  if(!b||!b.started) return a;
  return (new Date(b.started)>new Date(a.started))?b:a; // รอบที่เริ่มล่าสุดชนะ
}
function mergeData(local, remote){
  return {
    names: mergeNames(local.names, remote.names),
    hof:   mergeHOF(local.hof, remote.hof),
    session: mergeSession(local.session, remote.session)
  };
}
function applyToLocal(d){
  _applyingRemote=true;
  try{
    if(d.names) lsSet(K_NAMES, d.names);
    if(d.session) lsSet(K_SES, d.session);
    if(d.hof) lsSet(K_HOF, d.hof);
  } finally { _applyingRemote=false; }
}
function cloudPush(){
  if(!_cloudOK || _applyingRemote) return;
  clearTimeout(_pushTimer);
  _pushTimer=setTimeout(async ()=>{
    try{
      const local=localSnapshot();
      let remote=null;
      try{ const snap=await _cloudDoc.get(); if(snap.exists) remote=snap.data(); }catch(e){}
      const merged = remote ? mergeData(local, remote) : local;
      if(isEmptyData(merged)) return; // ไม่เขียนทับด้วยข้อมูลว่างเด็ดขาด
      merged.updatedAt = firebase.firestore.FieldValue.serverTimestamp();
      await _cloudDoc.set(merged, {merge:true});
    }catch(e){ console.warn("cloud push failed", e); }
  }, 600);
}
/* เขียนทับคลาวด์ด้วยข้อมูลในเครื่องแบบเด็ดขาด (ไม่ merge) — ใช้ตอน "ลบผู้เล่น" ที่ตั้งใจลบจริง
   เพื่อไม่ให้ตัว merge ดึงคนที่เพิ่งลบกลับมา */
async function cloudOverwrite(){
  if(!_cloudOK) return;
  clearTimeout(_pushTimer); // ยกเลิก push แบบ merge ที่ค้างอยู่
  try{
    const data=localSnapshot();
    if(isEmptyData(data)) return; // ไม่ล้างคลาวด์ให้ว่างเด็ดขาด
    data.updatedAt=firebase.firestore.FieldValue.serverTimestamp();
    await _cloudDoc.set(data); // แทนที่ทั้งเอกสาร
  }catch(e){ console.warn("cloud overwrite failed", e); }
}
function cloudListen(){
  if(!_cloudOK) return;
  _cloudDoc.onSnapshot(snap=>{
    if(!snap.exists) return;
    const remote=snap.data();
    // --- รับสถานะ "ตาที่กำลังเล่น" จากเครื่องอื่นที่คุมตาเดียวกัน ---
    // ใช้ ver (ตัวนับลอจิก) เป็นหลัก กันปัญหานาฬิกาเครื่องไม่ตรงกัน
    const g=remote.game;
    if(g && g.active && g.id===_gameId && _gameKey && g.by!==_clientId && (g.ver||0)>_gameVer && g.iv){
      applyRemoteGame(g);
    }
    handleJoinState(g);   // เครื่องที่มีตา active แต่ไม่มีกุญแจ -> โชว์ปุ่มเข้าร่วม
    // --- ข้อมูลกลุ่ม (ชื่อ/รอบนี้/HOF) ---
    if(isEmptyData(remote)) return;
    const merged=mergeData(localSnapshot(), remote);
    applyToLocal(merged);
    // refresh จอเฉพาะตอนไม่ได้อยู่ในเกม และไม่ได้กำลังพิมพ์อยู่ (กันจอเด้งตอนกรอกชื่อ)
    const ae=document.activeElement;
    const typing=ae && (ae.tagName==="INPUT"||ae.tagName==="TEXTAREA");
    if(S===null && !typing){ try{ renderSetup(); }catch(e){} }
  }, err=>console.warn("cloud listen err", err));
}
async function cloudBoot(){
  if(!cloudInit()) return;
  try{
    const snap=await _cloudDoc.get();
    if(snap.exists && !isEmptyData(snap.data())){
      applyToLocal(mergeData(localSnapshot(), snap.data()));
      if(S===null){ try{ renderSetup(); }catch(e){} }
    } else if(!isEmptyData(localSnapshot())){
      cloudPush(); // คลาวด์ยังว่าง -> ส่งข้อมูลในเครื่องขึ้นไปตั้งต้น
    }
  }catch(e){ console.warn("cloud initial load failed", e); }
  cloudListen();
}

/* ============================================================
   TV / SPECTATOR MODE — ทีวีเป็นจอผู้ชม (อ่านอย่างเดียว)
   - มือถือ (controller) ส่ง "ข้อมูลสาธารณะ" ของตาที่เล่นขึ้นคลาวด์ (field: live)
   - ทีวีเปิด ?tv=1 → อ่านอย่างเดียว ไม่เขียนอะไรขึ้นคลาวด์
   - เลขลับ (เจ้าของลูกที่ยังไม่ถูกยิง) ไม่ถูกส่งขึ้นคลาวด์เด็ดขาด
============================================================ */
const TV_MODE = /(?:^|[?&#])tv(?:=1)?(?:[&#]|$)/.test(location.search + location.hash);
let _liveTimer=null;

/* สร้าง snapshot สาธารณะจากเกมปัจจุบัน (ไม่มีเลขลับ) */
function buildLiveSnapshot(){
  if(typeof S==="undefined" || S===null) return { active:false, ts:Date.now() };
  if(S.phase==="entry"){
    return { active:true, phase:"entry", ts:Date.now(), players:S.players.map(p=>({name:p.name})) };
  }
  const t=turnState();
  const balls={};
  for(let n=1;n<=15;n++){
    const b=S.balls[n];
    if(b.shot){
      balls[n]={shot:true, type:b.type,
        by:(b.shotBy!=null && S.players[b.shotBy])?S.players[b.shotBy].name:null,
        owner:(b.owner!=null && S.players[b.owner])?S.players[b.owner].name:null};
    } else {
      balls[n]={shot:false}; // ไม่บอกเจ้าของ = กันเลขลับ
    }
  }
  return {
    active:true, phase:S.phase, ts:Date.now(),
    players:S.players.map((p,i)=>({name:p.name, net:netOf(i)})),
    order:t.sh!=null ? (S.order&&S.order.length===S.P?S.order:S.players.map((_,i)=>i)).map(i=>S.players[i].name) : [],
    shooter:(S.players[t.sh]?S.players[t.sh].name:null),
    streak:t.streak,
    balls, leftoverDone:!!S.leftoverDone,
    remaining:Object.values(S.balls).filter(b=>!b.shot).length,
    log:(S.log||[]).slice()   // บันทึกการยิง (อ้างถึงลูกที่ยิงลงแล้ว = เปิดเผยได้)
  };
}

/* ส่ง live ขึ้นคลาวด์ (เฉพาะ controller, debounce) — ไม่กระทบ names/session/hof
   ข้ามถ้า snapshot เหมือนเดิม (กัน loop จาก cloudListen -> renderSetup -> syncLive) */
let _lastLiveKey=null;
function syncLive(){
  if(TV_MODE || !_cloudOK) return;
  const snap=buildLiveSnapshot();
  const {ts, ...rest}=snap;
  const key=JSON.stringify(rest);
  if(key===_lastLiveKey) return;   // ไม่มีอะไรเปลี่ยน -> ไม่เขียนซ้ำ
  _lastLiveKey=key;
  clearTimeout(_liveTimer);
  _liveTimer=setTimeout(async ()=>{
    try{ await _cloudDoc.set({live:snap}, {merge:true}); }
    catch(e){ console.warn("live push failed", e); }
  }, 250);
}

/* ============================================================
   MULTI-CONTROLLER — หลายมือถือช่วยกันคุมตาเดียวกัน (สถานะเกมเข้ารหัส)
============================================================ */
const K_CTRL="pool_ctrl"; // {gameId, keyB64} กุญแจของตาที่กำลังคุม (เก็บในเครื่องคนคุม)
let _gameId=null, _gameKey=null, _gameKeyB64=null;
let _gameVer=0, _lastGameTs=0, _lastGameKey=null, _gameTimer=null, _applyingGame=false;

/* สร้างกุญแจ+รหัสตา ตอนเริ่มเกมใหม่ (เครื่องที่กดเริ่ม = คนคุมคนแรก) */
async function startCloudGame(){
  if(!_subtle){ _gameId=null; _gameKey=null; return; }
  try{
    _gameKey=await genGameKey();
    _gameKeyB64=await exportGameKey(_gameKey);
    _gameId=Math.random().toString(36).slice(2,8);
    _gameVer=0; _lastGameTs=0; _lastGameKey=null;
    lsSet(K_CTRL, {gameId:_gameId, keyB64:_gameKeyB64});
  }catch(e){ console.warn("startCloudGame failed", e); _gameId=null; _gameKey=null; }
}
/* เลิกคุม (กลับหน้าหลัก/จบเกม) — ล้างกุญแจในเครื่อง + แจ้งคลาวด์ว่าตาไม่ active */
function clearCloudGame(){
  const had=_gameId;
  _gameId=null; _gameKey=null; _gameKeyB64=null; _gameVer=0; _lastGameTs=0; _lastGameKey=null;
  clearTimeout(_gameTimer);
  try{ lsSet(K_CTRL, null); }catch(e){}
  if(had && _cloudOK){ try{ _cloudDoc.set({game:{active:false, ts:Date.now(), by:_clientId}}, {merge:true}); }catch(e){} }
}
/* กู้กุญแจที่เก็บไว้ตอนเปิดแอป (เครื่องคนคุมรีเฟรชแล้วยังคุมต่อได้) */
async function restoreCtrlKey(){
  if(!_subtle) return;
  const c=lsGet(K_CTRL, null);
  if(c && c.gameId && c.keyB64){
    try{ _gameId=c.gameId; _gameKeyB64=c.keyB64; _gameKey=await importGameKey(c.keyB64); }
    catch(e){ _gameId=null; _gameKey=null; }
  }
}

/* ส่งสถานะเกมเต็ม (เข้ารหัส) ขึ้นคลาวด์ — เฉพาะเครื่องที่ถือกุญแจ, debounce */
function syncGame(){
  if(TV_MODE || !_cloudOK || !_gameKey || !_gameId || !S) return;
  if(_applyingGame) return;                 // กำลัง apply ของรีโมต -> อย่าเขียนสะท้อนกลับ
  const stateStr=JSON.stringify(S);
  if(stateStr===_lastGameKey) return;       // ไม่มีอะไรเปลี่ยน
  _lastGameKey=stateStr;
  clearTimeout(_gameTimer);
  _gameTimer=setTimeout(async ()=>{
    try{
      const enc=await encryptJSON(_gameKey, JSON.parse(stateStr));
      _gameVer++;
      const ts=Date.now();
      _lastGameTs=ts;
      await _cloudDoc.set({game:{id:_gameId, ver:_gameVer, by:_clientId, active:true, ts, iv:enc.iv, ct:enc.ct}}, {merge:true});
    }catch(e){ console.warn("game push failed", e); }
  }, 250);
}

/* รับสถานะเกมจากเครื่องอื่น (ที่คุมตาเดียวกัน) แล้ว apply */
async function applyRemoteGame(g){
  if(!_gameKey || !g || !g.iv) return;
  // อย่าเด้งจอตอนกำลังพิมพ์ (กรอกเลข) หรือมี popup เปิดอยู่
  const ae=document.activeElement;
  if(ae && (ae.tagName==="INPUT"||ae.tagName==="TEXTAREA")) return;
  if(document.querySelector(".overlay")) return;
  _applyingGame=true;
  try{
    const state=await decryptJSON(_gameKey, g);
    S=state;
    _gameVer=g.ver||_gameVer;
    _lastGameTs=g.ts||Date.now();
    _lastGameKey=JSON.stringify(S);   // กันส่งสะท้อนกลับทันที
    entryGateOpen=false;
    renderGame();
  }catch(e){ console.warn("apply remote game failed", e); }
  finally{ _applyingGame=false; }
}

/* เลือกหน้าจอให้ตรงกับเฟสของ S (ใช้ตอน apply สถานะจากเครื่องอื่น) */
function renderGame(){
  if(!S){ renderSetup(); return; }
  try{
    if(S.phase==="result") renderResult();
    else if(S.phase==="review") renderEndReview();
    else if(S.phase==="entry") renderEntry();
    else renderShoot();
  }catch(e){ console.warn("renderGame failed", e); }
}

/* ยกเลิก/โล๊ะตาที่กำลังเล่น (ไม่บันทึกผลตานี้ · ยอดสะสมรอบนี้ + สถิติเดิมไม่หาย) */
function cancelGame(){
  S=null; entryGateOpen=false; clearCloudGame(); homeTab="play"; renderSetup();
}
function confirmCancelGame(){
  const existing=document.querySelector(".overlay"); if(existing) existing.remove();
  const ov=el(`<div class="overlay invite"></div>`);
  const box=el(`<div class="overlay-box invite" style="border-color:var(--danger)">
    <h2 style="color:var(--danger)">🗑️ ยกเลิกตานี้?</h2>

let _tvSoundOn=false, _tvPrevLog=null, _tvPrevPhase=null;

/* แปลงบรรทัด log -> {sfx, say} */
function tvSoundFromLine(line){
  if(line.indexOf("[ลูกเหลือ]")===0) return null;                 // เป็นรายละเอียดของโบนัส ข้าม
  if(line.indexOf("แจกแต้มเลขที่เหลือ")>=0) return {sfx:"bonus"};   // หัวข้อโบนัสลูกเหลือ
  let s=null;
  if(line.indexOf("ลูกขาว")>=0) s="scratch";
  else if(line.indexOf("ยิงพลาด")>=0) s=null;                     // พลาด: ไม่มีเอฟเฟกต์ (พูดอย่างเดียว)
  else if(line.indexOf("แต้มพิเศษ")>=0) s="special";
  else if(line.indexOf("เลขของตัวเอง")>=0) s="own";
  else if(line.indexOf("ลูกหลอก")>=0) s="decoy";
  else if(line.indexOf("เลขของ")>=0) s="steal";                   // ต้องเช็คหลัง "เลขของตัวเอง"
  const say=line.replace(/[\[\]⭐🫥⚪→=•·—]/g," ").replace(/\s+/g," ").trim();
  return {sfx:s, say};
}
function tvPlaySounds(live){
  if(!_tvSoundOn) return;
  const log=(live&&live.log)||[];
  const phase=live&&live.phase;
  if(_tvPrevLog===null){ _tvPrevLog=log.slice(); _tvPrevPhase=phase; return; }  // ครั้งแรก = ตั้งฐาน ไม่เล่นย้อนหลัง
  if(log.length>_tvPrevLog.length){
    log.slice(_tvPrevLog.length).forEach(line=>{
      const r=tvSoundFromLine(line); if(!r) return;
      if(r.sfx) sfx(r.sfx);
      if(r.say) speak(r.say);
    });
  }
  if(phase==="result" && _tvPrevPhase!=="result") sfx("end");
  _tvPrevLog=log.slice();
  _tvPrevPhase=phase;
}

/* ---------------- game state ---------------- */
let S = null;
function newGameState(players, cardsPer, contMode, contLimit, dealMode){
  players = players.map(p=>({name:p.name, hc:Object.assign(defaultHC(), p.hc||{})}));
  const P=players.length;
  const ledger=Array.from({length:P},()=>Array(P).fill(0));
  // balls 1..15
  const balls={};
  for(let n=1;n<=15;n++){
    balls[n]={n, type:(n>=14?"special":"decoy"), owner:null, shot:false, shotBy:null, leftover:false};
  }
  return {
    players, cardsPer, P, ledger, balls,
    hands:players.map(()=>[]),  // numbers per player
    pins:players.map(()=>null), // รหัสส่วนตัวต่อคน (ดูเลขตัวเองตอนยิง) — ไม่บันทึกลงเครื่อง/คลาวด์
    phase:"entry", entryIndex:0,
    firstShooter:0, order:Array.from({length:P},(_,i)=>i), actions:[],
    contMode:contMode||"unlimited", contLimit:contLimit||1,
    dealMode:dealMode||"manual",
    log:[], finished:false, leftoverDone:false
  };
}
function transfer(r,g,amt){
  if(r===g) return;
  S.ledger[r][g]+=amt; S.ledger[g][r]-=amt;
}
function netOf(i){ return S.ledger[i].reduce((a,b)=>a+b,0); }
/* สับลำดับ (Fisher-Yates) — คืน array ใหม่ */
function shuffle(arr){ const a=arr.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

/* ---------------- helpers ---------------- */
const $=sel=>document.querySelector(sel);
const app=()=>document.getElementById("app");
function el(html){ const d=document.createElement("div"); d.innerHTML=html.trim(); return d.firstChild; }
function esc(s){ return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

/* บันทึกเรียงตามลำดับเหตุการณ์ · ใหม่สุดอยู่บนเสมอ
   (แต้มพิเศษเลขเหลือ = หัวข้อ + บรรทัดลูกเหลือ นับเป็น 1 เหตุการณ์ อยู่ติดกัน) */
function logHTML(log){
  const isHeader=l=>l.startsWith('— แจกแต้ม');
  const isLeft=l=>l.startsWith('[ลูกเหลือ]');
  // จับกลุ่มเป็นเหตุการณ์
  const groups=[];
  log.forEach(l=>{
    const prev=groups[groups.length-1];
    if(isLeft(l) && prev && isHeader(prev[0])) prev.push(l);
    else groups.push([l]);
  });
  groups.reverse(); // ใหม่สุดอยู่บน
  return groups.map(g=>g.map(l=>{
    let cls="shoot";
    if(isHeader(l)) cls="left lead";
    else if(isLeft(l)) cls="left";
    else if(l.includes('ลูกขาว')) cls="foul";
    else if(l.includes('ยิงพลาด')) cls="miss";
    return `<div class="logline ${cls}">${esc(l)}</div>`;
  }).join("")).join("");
}

/* ---------------- anti-cheat alarm ---------------- */
let _audioCtx=null;
function playAlarm(){
  try{
    _audioCtx = _audioCtx || new (window.AudioContext||window.webkitAudioContext)();
    const ctx=_audioCtx; if(ctx.state==="suspended") ctx.resume();
    const now=ctx.currentTime;
    [0,0.3,0.6,0.9].forEach((t,i)=>{
      const o=ctx.createOscillator(), g=ctx.createGain();
      o.type="square"; o.frequency.value = i%2===0?900:620;
      g.gain.setValueAtTime(0.0001, now+t);
      g.gain.exponentialRampToValueAtTime(0.5, now+t+0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, now+t+0.27);
      o.connect(g); g.connect(ctx.destination);
      o.start(now+t); o.stop(now+t+0.28);
    });
  }catch(e){}
}
let _thVoice=null;
function pickThaiVoice(){
  try{
    const vs=speechSynthesis.getVoices()||[];
    _thVoice = vs.find(v=>/th(-|_)?/i.test(v.lang)) || null;
  }catch(e){}
}
try{ pickThaiVoice(); if(typeof speechSynthesis!=="undefined") speechSynthesis.onvoiceschanged=pickThaiVoice; }catch(e){}
function speak(text){
  if(_muted) return;
  try{
    if(!_thVoice) pickThaiVoice();
    const u=new SpeechSynthesisUtterance(text);
    u.lang="th-TH"; u.rate=1; u.volume=1; u.pitch=1;
    if(_thVoice) u.voice=_thVoice;
    speechSynthesis.cancel(); speechSynthesis.speak(u);
  }catch(e){}
}
/* ประโยคพูดสรุปผลการยิงแต่ละลูก (ภาษาไทย) */
function shotPhrase(kind, shooterName, ownerName, hc){
  hc=hc||defaultHC();
  switch(kind){
    case "own":     return `${shooterName} ยิงเลขของตัวเอง ได้ ${hc.own} แต้มจากทุกคน`;
    case "steal":   return `${shooterName} ยิงลูกของ ${ownerName} ได้ ${hc.steal} แต้มจาก ${ownerName}`;
    case "special": return `${shooterName} ยิงลูกพิเศษ ได้ ${hc.special} แต้มจากทุกคน`;
    case "scratch": return `${shooterName} ลูกขาวลง เสีย ${hc.scratch} แต้มให้ทุกคน`;
    case "miss":    return `${shooterName} ยิงพลาด`;
    default:        return `${shooterName} ยิงลูกหลอก ไม่มีแต้ม`;
  }
}

let _muted = lsGet("pool_muted")==="1";
function setMuted(m){ _muted=m; lsSet("pool_muted", m?"1":"0"); }
/* เล่นโน้ตเดียว: f=ความถี่, t0=เวลาเริ่ม(วินาที offset), dur=ความยาว, opt={type,vol,to}=สไลด์ไปความถี่ to */
function tone(f, t0, dur, opt){
  opt=opt||{};
  const ctx=_audioCtx; const now=ctx.currentTime+t0;
  const o=ctx.createOscillator(), g=ctx.createGain();
  o.type=opt.type||"sine"; o.frequency.setValueAtTime(f, now);
  if(opt.to) o.frequency.exponentialRampToValueAtTime(opt.to, now+dur);
  const v=opt.vol==null?0.4:opt.vol;
  g.gain.setValueAtTime(0.0001, now);
  g.gain.exponentialRampToValueAtTime(v, now+0.012);
  g.gain.exponentialRampToValueAtTime(0.0001, now+dur);
  o.connect(g); g.connect(ctx.destination);
  o.start(now); o.stop(now+dur+0.02);
}
const SFX={
  own(){ tone(660,0,0.12,{vol:0.35}); tone(990,0.09,0.18,{vol:0.4}); },               // เลขตัวเองลง: ติ๊ง-ติ๊ง สดใส
  steal(){ tone(523,0,0.1,{type:"triangle",vol:0.4}); tone(784,0.07,0.1,{type:"triangle",vol:0.42}); tone(1175,0.15,0.22,{type:"triangle",vol:0.45}); }, // ปล้นเลข: ชา-ชิ่ง
  special(){ [988,1319,1568,2093].forEach((f,i)=>tone(f,i*0.06,0.16,{vol:0.32})); },  // ลูกพิเศษ: ระยิบระยับ
  decoy(){ tone(180,0,0.22,{type:"sawtooth",vol:0.3,to:90}); },                       // ลูกหลอก: ตุบทึบ
  bonus(){ // โบนัสลูกเหลือ: แฟนแฟร์อลังการ + ประกายเหรียญ
    [523,659,784,1047,1319].forEach((f,i)=>tone(f,i*0.1,0.5,{type:"triangle",vol:0.4}));

  },
  end(){ [523,659,784,1047].forEach((f,i)=>tone(f,i*0.12,0.45,{type:"triangle",vol:0.4})); tone(1319,0.48,0.6,{type:"triangle",vol:0.42}); }, // จบตา: แฟนแฟร์
  undo(){ tone(440,0,0.12,{type:"square",vol:0.22,to:220}); },                        // ย้อนกลับ
  scratch(){ tone(330,0,0.18,{type:"sawtooth",vol:0.32,to:160}); tone(220,0.16,0.3,{type:"sawtooth",vol:0.34,to:90}); } // ลูกขาว: เสียงเสียแต้ม
};

/* แผงตั้งค่า "ต่อให้รายคน" ในหน้าตั้งวง */
function renderHandicaps(box){
  box.innerHTML="";
  if(!setupSelected.length){ box.innerHTML=`<div class="muted">เลือกผู้เล่นด้านบนก่อน</div>`; return; }
  setupSelected.forEach(nm=>{
    const hc=setupHC[nm]||(setupHC[nm]=defaultHC());
    const open=hcOpen.has(nm);
    const row=el(`<div class="hc-row" style="border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:8px">
      <div class="row" style="justify-content:space-between;align-items:center">
        <b>${esc(nm)} ${isCustomHC(hc)?'<span class="pill pos">ต่อให้</span>':''}</b>
        <button class="btn-ghost hc-tog" style="width:auto;padding:4px 14px">${open?'ปิด ▲':'⚙️ ตั้งค่า'}</button>
      </div>
      <div class="hc-body" style="display:${open?'block':'none'};margin-top:8px">
        <label>ยิงเลขตัวเอง (แต้ม/คน)</label><input type="number" class="hc-own" value="${hc.own}">
        <label>ยิงลูกพิเศษ ⭐ (แต้ม/คน)</label><input type="number" class="hc-special" value="${hc.special}">
        <label>ยิงแย่งเลขคนอื่น (แต้ม)</label><input type="number" class="hc-steal" value="${hc.steal}">
        <label>ลูกขาวลง/ตกโต๊ะ เสีย (แต้ม/คน)</label><input type="number" class="hc-scratch" value="${hc.scratch}">
        <label>โบนัสลูกเหลือ (แต้ม/คน · เลขละ)</label><input type="number" class="hc-leftover" value="${hc.leftover}">
        <label>จำกัดยิงติดกัน (ครั้ง · เว้นว่าง = ตามวง)</label><input type="number" class="hc-cont" min="1" value="${hc.contLimit||''}">
        <div class="spacer"></div>
        <button class="btn-ghost hc-reset" style="width:100%">↺ คืนค่าปกติ</button>
      </div>
    </div>`);
    row.querySelector(".hc-tog").addEventListener("click",()=>{ open?hcOpen.delete(nm):hcOpen.add(nm); renderHandicaps(box); });
    const numv=(sel,def)=>{ const v=parseInt(row.querySelector(sel).value); return isNaN(v)?def:v; };
    const upd=()=>{
      hc.own=numv(".hc-own",UNIT); hc.special=numv(".hc-special",UNIT);
      hc.steal=numv(".hc-steal",UNIT*2); hc.scratch=numv(".hc-scratch",UNIT);
      hc.leftover=numv(".hc-leftover",UNIT*2);
      const cl=parseInt(row.querySelector(".hc-cont").value); hc.contLimit=(isNaN(cl)||cl<1)?null:cl;
      const tag=row.querySelector(".pill"); // อัปเดต badge "ต่อให้" สดๆ
      if(isCustomHC(hc) && !tag){ row.querySelector("b").insertAdjacentHTML("beforeend",' <span class="pill pos">ต่อให้</span>'); }
      else if(!isCustomHC(hc) && tag){ tag.remove(); }
    };
    row.querySelectorAll("input").forEach(inp=>inp.addEventListener("input",upd));
    row.querySelector(".hc-reset").addEventListener("click",()=>{ setupHC[nm]=defaultHC(); renderHandicaps(box); });
    box.appendChild(row);
  });
}

/* ============================================================
   SCREEN 2: SECRET CARD ENTRY (pass and play)
============================================================ */
let entryGateOpen=false;
function renderEntry(){
  const A=app(); A.innerHTML="";
  syncLive(); syncGame();
  const i=S.entryIndex;
  if(i>=S.P){ // done -> build owners, สุ่มลำดับการเล่นทั้งหมด, then shoot
    buildOwners();
    S.order=shuffle(S.players.map((_,k)=>k)); // สับลำดับทั้งวง ไม่ใช่แค่คนเริ่ม
    S.firstShooter=S.order[0];                 // เผื่อโค้ดเก่าอ้างถึง
    S.actions=[]; S._lastReveal=""; S._strokeOpen=false;
    S.phase="shoot"; renderShoot(); return;
  }
  const name=S.players[i].name;
  const isRandom=S.dealMode==="random";

  if(!entryGateOpen){
    const g=el(`<div class="card gate">
      <div class="muted">ส่งเครื่องให้</div>
      <div class="name">${esc(name)}</div>
      <div class="muted">คนอื่นอย่าแอบดูนะ 🙈</div>
      <div class="spacer"></div><div class="spacer"></div>
      <button class="btn-primary" id="open">${isRandom?"ดูเลขของฉัน 👀":"เริ่มกรอกไพ่ของฉัน"}</button>
    </div>`);
    A.appendChild(g);
    g.querySelector("#open").addEventListener("click",()=>{ entryGateOpen=true; renderEntry(); });
    { const ac=el(`<div class="card"></div>`); ac.appendChild(abandonButton()); A.appendChild(ac); }
    return;
  }

  if(isRandom){
    // ระบบสุ่มแจกแล้ว (dealHands) — แค่เฉลยเลขของตัวเองแบบอ่านอย่างเดียว
    const hand=S.hands[i].slice().sort((a,b)=>a-b);
    const balls=hand.map(n=>ballHTML(n)).join("");
    const r=el(`<div class="card">
      <h2>เลขของ ${esc(name)} <span class="pill">${S.cardsPer} ใบ</span></h2>
      <div class="hint">จำเลขของตัวเองให้ดี แล้วกดซ่อนก่อนส่งเครื่องต่อ</div>
      <div class="spacer"></div>
      <div class="reveal-balls">${balls}</div>
      <div class="spacer"></div>
      <div class="hint">🔒 ตั้งรหัสส่วนตัว (ถ้าอยากเปิดดูเลขตัวเองตอนยิง) — เว้นว่างไว้ก็ได้</div>
      <input type="number" id="pin" inputmode="numeric" placeholder="รหัส (ตัวเลข) ไม่ใส่ก็ได้" style="text-align:center;margin-top:6px">
      <div class="spacer"></div>
      <button class="btn-primary" id="confirm">จำได้แล้ว ซ่อน 🔒</button>
    </div>`);
    A.appendChild(r);
    r.querySelector("#confirm").addEventListener("click",()=>{
      const pv=(r.querySelector("#pin").value||"").trim();
      S.pins[i]=pv?pv:null;
      S.entryIndex++; entryGateOpen=false;
      renderEntry();
    });
    return;
  }

  const c=el(`<div class="card">
    <h2>ไพ่ของ ${esc(name)} <span class="pill">${S.cardsPer} ใบ</span></h2>
    <div class="hint">กรอกเลขบนไพ่ (1–13) ห้ามซ้ำกับผู้เล่นอื่น</div>
    <div class="spacer"></div>
    <div class="grid" id="inputs"></div>
    <div class="err" id="e"></div>
    <div class="spacer"></div>
    <div class="hint">🔒 ตั้งรหัสส่วนตัว (ถ้าอยากเปิดดูเลขตัวเองตอนยิง) — เว้นว่างไว้ก็ได้</div>
    <input type="number" id="pin" inputmode="numeric" placeholder="รหัส (ตัวเลข) ไม่ใส่ก็ได้" style="text-align:center;margin-top:6px">
    <div class="spacer"></div>
    <button class="btn-primary" id="confirm">ยืนยันและซ่อน 🔒</button>
  </div>`);
  A.appendChild(c);
  const ig=c.querySelector("#inputs");
  for(let k=0;k<S.cardsPer;k++){
    const inp=el(`<input type="number" min="1" max="13" inputmode="numeric" placeholder="?">`);
    inp.style.textAlign="center";
    ig.appendChild(inp);
  }
  c.querySelector("#confirm").addEventListener("click",()=>{
    const e=c.querySelector("#e"); e.textContent="";
    const vals=[...ig.querySelectorAll("input")].map(x=>parseInt(x.value));
    if(vals.some(v=>isNaN(v))){ e.textContent="กรอกให้ครบทุกช่อง"; return; }
    if(vals.some(v=>v<1||v>13)){ e.textContent="ใช้ได้เฉพาะเลข 1–13"; return; }
    if(new Set(vals).size!==vals.length){ e.textContent="มีเลขซ้ำกันเองในมือ ลองใหม่"; return; }
    // cross-player duplicate => loud public alarm + force full redraw (anti-cheat)
    const taken=new Set();
    S.hands.forEach((h,idx)=>{ if(idx!==i) h.forEach(v=>taken.add(v)); });
    if(vals.some(v=>taken.has(v))){ triggerRedraw(); return; }
    S.hands[i]=vals;
    const pv=(c.querySelector("#pin").value||"").trim();
    S.pins[i]=pv?pv:null;
    S.entryIndex++; entryGateOpen=false;
    renderEntry();
  });
}
function buildOwners(){
  S.hands.forEach((h,idx)=>{ h.forEach(n=>{ S.balls[n].type="owned"; S.balls[n].owner=idx; }); });
}
/* สุ่มแจกเลข 1–13 ให้ผู้เล่นคนละ cardsPer ใบ (ไม่ซ้ำกัน) */
function dealHands(){
  const need=S.P*S.cardsPer;
  const pool=shuffle(Array.from({length:13},(_,i)=>i+1)).slice(0,need);
  for(let i=0;i<S.P;i++){
    S.hands[i]=pool.slice(i*S.cardsPer,(i+1)*S.cardsPer).sort((a,b)=>a-b);
  }
}
/* markup ของลูก 1 ลูก (ใช้ซ้ำในจอเฉลยเลขของตัวเอง) */
function ballHTML(n, extraCls){
  const def=BALL[n];
  const style=def.t==="st"?"":`background:${def.c}`;
  const inner=(def.t==="st"?`<div class="band" style="background:${def.c}"></div>`:"")+`<div class="shine"></div><div class="num">${n}</div>`;
  const cls="ball"+(def.t==="st"?" stripe":"")+(extraCls?(" "+extraCls):"");
  return `<div class="${cls}" style="${style}">${inner}</div>`;
}

/* ============================================================
   SCREEN 3: SHOOTING
============================================================ */
/* replay actions to find whose turn it is + current consecutive streak.
   pot = keep turn (until limit). miss = pass turn. */
/* ลิมิตยิงติดกันของคน i: ใช้ค่าต่อให้รายคนก่อน ถ้าไม่มีจึงใช้ค่าของวง (0 = ไม่จำกัด) */
function limitFor(i){
  const pl=S.players[i].hc && S.players[i].hc.contLimit;
  if(pl) return pl;
  return S.contMode==="limited" ? S.contLimit : 0;
}
function turnState(){
  const order=(S.order&&S.order.length===S.P)?S.order:S.players.map((_,i)=>i);
  const P=S.P;
  const acts=S.actions;
  let pos=0, streak=0; // streak = จำนวน "ครั้งที่ยิง" ติดกัน (1 ครั้งอาจลงหลายลูก) · เดินตามลำดับที่สุ่มไว้
  for(let idx=0; idx<acts.length; idx++){
    const a=acts[idx];
    if(a.miss||a.scratch){ pos=(pos+1)%P; streak=0; continue; }
    // ลูกที่ลงพร้อมครั้งก่อน (sameStroke) ไม่เพิ่มจำนวนครั้ง — นับรวมเป็นการยิงครั้งเดียว
    if(!a.sameStroke) streak++;
    const next=acts[idx+1];
    // สตรีคยังเปิดอยู่ถ้าลูกถัดไปคือลูกที่ลงพร้อมกัน หรือ (ลูกสุดท้าย) กำลังรอผู้เล่นยืนยันว่าจบครั้งนี้
    const stillOpen = next ? (!next.miss && !next.scratch && next.sameStroke) : !!S._strokeOpen;
    if(!stillOpen){
      const lim=limitFor(order[pos]);
      if(lim && streak>=lim){ pos=(pos+1)%P; streak=0; }
    }
  }
  return {sh:order[pos], streak, pos};
}
function orderedNames(){ const order=(S.order&&S.order.length===S.P)?S.order:S.players.map((_,i)=>i); return order.map(i=>S.players[i].name); }
function currentShooter(){ return turnState().sh; }

/* เปิดดูเลขของตัวเอง (เฉพาะคนที่ถึงตายิง) — ใส่รหัสส่วนตัวถ้าตั้งไว้ */
function revealMyNumbers(sh){
  const pin=S.pins ? S.pins[sh] : null;
  if(pin){
    const tryPin=prompt(`ใส่รหัสส่วนตัวของ ${S.players[sh].name} เพื่อดูเลข`);
    if(tryPin==null) return;              // กดยกเลิก
    if(tryPin.trim()!==pin){ alert("รหัสไม่ถูกต้อง 🔒"); return; }
  }
  const hand=S.hands[sh].slice().sort((a,b)=>a-b);
  const balls=hand.map(n=>{
    const shotCls=S.balls[n].shot?" shot":"";
    return ballHTML(n, shotCls);
  }).join("");
  const note=pin?"":"⚠️ คนนี้ไม่ได้ตั้งรหัสส่วนตัวไว้";
  const ov=el(`<div class="overlay" style="animation:none;background:rgba(0,0,0,.88)">
    <div class="overlay-box" style="border-color:var(--accent)">
      <div style="font-size:44px">🔢</div>
      <h2 style="color:var(--accent)">เลขของ ${esc(S.players[sh].name)}</h2>
      <p>ลูกที่จางคือลูกที่ยิงลงไปแล้ว ${note?('<br>'+note):''}</p>
      <div class="reveal-balls" style="justify-content:center">${balls}</div>
      <div class="spacer"></div>
      <button class="btn-primary" id="hideRev" style="width:100%">ซ่อน 🔒</button>
    </div></div>`);
  document.body.appendChild(ov);
  ov.querySelector("#hideRev").addEventListener("click",()=>ov.remove());
}

function renderShoot(){
  const A=app(); A.innerHTML="";
  syncLive(); syncGame();
  const {sh, streak, pos}=turnState();

  // turn display (random first, then pot=continue / miss=pass)
  const nextName=S.players[S.order[(pos+1)%S.P]].name; // คนถัดไปตามลำดับที่สุ่มไว้
  const lim=limitFor(sh);
  let streakLine;
  if(streak===0){
    streakLine=`ถัดไปถ้าพลาด: ${esc(nextName)}`;
  } else if(lim){
    streakLine=`ยิงติดกันแล้ว ${streak} ครั้ง · ยิงต่อได้อีก ${lim-streak} ครั้ง`;
  } else {
    streakLine=`ยิงติดกันแล้ว ${streak} ครั้ง · ยิงต่อได้เรื่อยๆ`;
  }
  const orderStr=orderedNames().map((nm,k)=>k===pos?`<b style="color:var(--accent)">${esc(nm)}</b>`:esc(nm)).join(" → ");
  const turn=el(`<div class="card center">
    <div class="muted">${S.actions.length===0?'🎲 สุ่มลำดับให้แล้ว':(streak>0?'ยิงต่อ!':'ถึงตาของ')}</div>
    <div style="font-size:26px;font-weight:800;color:var(--accent);margin:6px 0">${esc(S.players[sh].name)}</div>
    <div class="muted">${streakLine}</div>
    <div class="muted" style="margin-top:6px;font-size:12px">ลำดับ: ${orderStr}</div>
  </div>`);
  A.appendChild(turn);

  // ปุ่มดูเลขของตัวเอง — เฉพาะคนที่ถึงตายิงเท่านั้น (คนอื่นดูไม่ได้)
  {
    const revBtn=el(`<button class="btn-ghost" id="myNums" style="width:100%;margin-bottom:12px">🔒 ดูเลขของฉัน (${esc(S.players[sh].name)})</button>`);
    revBtn.addEventListener("click",()=>revealMyNumbers(sh));
    A.appendChild(revBtn);
  }
  { const ib=inviteButton(); if(ib) A.appendChild(ib); }

  // โบนัสลูกเหลือ: แบนเนอร์ค้างไว้ให้เห็นชัดจนจบตา
  if(S.leftoverDone){
    const remLoCount=Object.values(S.balls).filter(b=>b.leftover && !b.shot).length;
    const _lv=[...new Set(S.players.map(p=>p.hc.leftover))];
    const _loTxt=_lv.length===1?`เลขละ ${_lv[0]} แต้มให้เจ้าของ`:`ตามค่าโบนัสลูกเหลือของเจ้าของ`;
    const banner=el(`<div class="card lo-banner center">
      <div class="t">🪙 แจกแต้มเลขที่เหลือบนโต๊ะแล้ว (${_loTxt})</div>
      <div class="muted" style="margin-top:4px">${remLoCount?'ยิงเก็บแต้มต่อได้จนหมดโต๊ะ · เลขยังไม่เฉลย':'ยิงครบทุกลูกแล้ว'}</div>
    </div>`);
    A.appendChild(banner);
  }

  // reveal box
  const rev=el(`<div class="reveal muted" id="rev">${esc(S._lastReveal||('แตะลูกที่ '+S.players[sh].name+' ยิงลง'))}</div>`);

  // ปุ่มยกเลิกการกระทำล่าสุด ไว้ด้านบนเหนือลูก (กดง่ายระหว่างเล่น) · แสดงตลอด แต่กดได้เมื่อมีการกระทำ
  {
    const can=S.actions.length>0;
    const undoTop=el(`<button class="btn-ghost" id="undoTop" style="width:100%;margin-bottom:12px${can?'':';opacity:.45'}"${can?'':' disabled'}>↩ ยกเลิกการกระทำล่าสุด</button>`);
    if(can) undoTop.addEventListener("click",undoLast);
    A.appendChild(undoTop);
  }

  // balls
  const remaining=Object.values(S.balls).filter(b=>!b.shot).length;
  const bc=el(`<div class="card">
    <h2>ลูกบนโต๊ะ <span class="pill" id="rem">เหลือ ${remaining} ลูก</span></h2>`);
  bc.appendChild(rev);
  const grid=el(`<div class="grid" id="balls"></div>`);
  bc.appendChild(grid);
  A.appendChild(bc);

  for(let n=1;n<=15;n++){
    const b=S.balls[n];
    const def=BALL[n];
    let cls="ball"+(def.t==="st"?" stripe":"");
    if(b.type==="special") cls+=" special";
    if(b.shot){
      cls+=" shot";
      if(b.type==="owned") cls+=" owned-rev";
      else if(b.type==="decoy") cls+=" decoy-rev";
    }
    const style=def.t==="st"?"":`background:${def.c}`;
    const inner=(def.t==="st"?`<div class="band" style="background:${def.c}"></div>`:"")
      +`<div class="shine"></div><div class="num">${n}</div>`;
    const bb=el(`<div class="${cls}" style="${style}">${inner}</div>`);
    if(!b.shot){
      bb.addEventListener("click",()=>shootBall(n));
    }
    grid.appendChild(bb);
  }

  // miss / skip turn + ลูกขาว (scratch)
  const skip=el(`<div class="card">
    <button class="btn-ghost" id="skip" style="width:100%">⏭ ยิงพลาด / ข้ามไปคนถัดไป</button>
    <button class="btn-ghost foul-btn" id="scratch" style="width:100%;margin-top:8px">⚪ ลูกขาวลง / ตกโต๊ะ — เสีย ${S.players[sh].hc.scratch} แต้มให้ทุกคน</button>
  </div>`);
  A.appendChild(skip);
  skip.querySelector("#skip").addEventListener("click",()=>{
    S._strokeOpen=false;
    speak(shotPhrase("miss", S.players[sh].name));
    S.actions.push({miss:true, by:sh});
    S.log.push(`[${S.players[sh].name}] ยิงพลาด`);
    S._lastReveal=`${S.players[sh].name} ยิงพลาด → เปลี่ยนคน`;
    renderShoot();
  });
  skip.querySelector("#scratch").addEventListener("click",()=>{
    const shooterName=S.players[sh].name;
    sfx("scratch");
    speak(shotPhrase("scratch", shooterName, "", S.players[sh].hc));
    S._strokeOpen=false;
    const msg=applyScratch(sh);
    S.actions.push({scratch:true, by:sh});
    S.log.push(`[${shooterName}] ${msg}`);
    S._lastReveal=`${shooterName} ${msg} → เปลี่ยนคน`;
    renderShoot();
    showShotPopup({kind:"scratch", shooterName, passed:true, hc:S.players[sh].hc});
  });

  // scoreboard
  A.appendChild(renderScoreCard());

  // สรุป "ต่อให้" รายคน (ถ้ามี) ให้ทุกคนเห็นดีลก่อนเล่น
  const hcList=S.players.map((p,i)=>({p,i})).filter(({p})=>isCustomHC(p.hc));
  if(hcList.length){
    const rows=hcList.map(({p})=>{
      const h=p.hc, parts=[];
      if(h.own!==UNIT) parts.push(`เลขตัวเอง ${h.own}`);
      if(h.special!==UNIT) parts.push(`พิเศษ ${h.special}`);
      if(h.steal!==UNIT*2) parts.push(`แย่ง ${h.steal}`);
      if(h.scratch!==UNIT) parts.push(`ลูกขาว ${h.scratch}`);
      if(h.leftover!==UNIT*2) parts.push(`โบนัสลูกเหลือ ${h.leftover}`);
      if(h.contLimit) parts.push(`ยิงติดกัน ≤ ${h.contLimit} ครั้ง`);
      return `<div style="padding:6px 0;border-bottom:1px solid var(--line)"><b>${esc(p.name)}</b> <span class="muted">${parts.join(" · ")}</span></div>`;
    }).join("");
    A.appendChild(el(`<div class="card"><h2>🎯 ต่อให้รายคน</h2>${rows}</div>`));
  }

  // info + undo (ตาจบเองอัตโนมัติ ไม่มีปุ่มจบ)
  const endCard=el(`<div class="card">
    <div class="hint">เมื่อลูกหลอกหมดโต๊ะ และลูกของผู้เล่นเหลือไม่เกิน ${S.cardsPer} ลูก (จำนวนไพ่ · ไม่นับลูกพิเศษ 14/15) จะเด้ง Popup แจกโบนัสลูกเหลือให้เจ้าของ (เลขละตามค่าโบนัสลูกเหลือของแต่ละคน · ปกติ ${UNIT*2}) แล้วยิงเก็บแต้มต่อจนหมดโต๊ะ · ตาจะจบเองเมื่อหมดโต๊ะ หรือเหลือแต่ลูกหลอก</div>
    <div class="spacer"></div>
    <button class="btn-ghost" id="undo" style="width:100%">↩ ยกเลิกการกระทำล่าสุด</button>
  </div>`);
  A.appendChild(endCard);
  endCard.querySelector("#undo").addEventListener("click",undoLast);

  // log
  if(S.log.length){
    const lc=el(`<div class="card"><h2>บันทึกการยิง</h2><div class="log" id="log"></div></div>`);
    A.appendChild(lc);
    lc.querySelector("#log").innerHTML=logHTML(S.log);
  }

  // ยกเลิก/โล๊ะตานี้
  { const ac=el(`<div class="card"></div>`); ac.appendChild(abandonButton()); A.appendChild(ac); }
}

function applyPotScore(n, sh){
  const b=S.balls[n];
  b.shot=true; b.shotBy=sh;
  const hc=S.players[sh].hc;
  let msg="";
  if(b.type==="special"){
    S.players.forEach((p,j)=>transfer(sh,j,hc.special));
    msg=`ยิงลูก ${n} = แต้มพิเศษ ⭐ ลง → ได้ ${hc.special} แต้มจากทุกคน`;
  } else if(b.type==="owned"){
    if(b.owner===sh){
      S.players.forEach((p,j)=>transfer(sh,j,hc.own));
      msg=`ยิงลูก ${n} = เลขของตัวเองลง → ได้ ${hc.own} แต้มจากทุกคน`;
    } else {
      transfer(sh,b.owner,hc.steal);
      msg=`ยิงลูก ${n} = เลขของ ${S.players[b.owner].name} ลง → ได้ ${hc.steal} แต้มจาก ${S.players[b.owner].name}`;
    }
  } else {
    msg=`ยิงลูก ${n} = ลูกหลอก 🫥 ลง → ไม่มีแต้ม`;
  }
  return msg;
}

/* ลูกขาวลงหลุม / ตกออกนอกโต๊ะ: ผู้ยิงเสีย UNIT แต้มให้ทุกคน (คนละ UNIT) แล้วเปลี่ยนคน */
function applyScratch(sh){
  const sc=S.players[sh].hc.scratch;
  S.players.forEach((p,j)=>{ if(j!==sh) transfer(j,sh,sc); });
  return `⚪ ลูกขาวลง/ตกโต๊ะ → เสีย ${sc} แต้มให้ทุกคน`;
}

/* popup เด้งทุกครั้งที่ยิงลูก -> เห็นชัดว่าลูกของใคร / หลอก / พิเศษ */
function showShotPopup(d, after){
  const hc=d.hc||defaultHC();
  const K={
    own:{cls:"k-own", icon:"✅", label:"เลขของตัวเอง", pts:`ได้ ${hc.own} แต้มจากทุกคน`},
    steal:{cls:"k-steal", icon:"🎯", label:`เลขของ ${esc(d.ownerName)}`, pts:`ได้ ${hc.steal} แต้มจาก ${esc(d.ownerName)}`},
    special:{cls:"k-special", icon:"⭐", label:"ลูกพิเศษ", pts:`ได้ ${hc.special} แต้มจากทุกคน`},
    decoy:{cls:"k-decoy", icon:"🫥", label:"ลูกหลอก", pts:"ไม่มีแต้ม"},
    scratch:{cls:"k-scratch", icon:"⚪", label:"ลูกขาวลง / ตกโต๊ะ", pts:`เสีย ${hc.scratch} แต้มให้ทุกคน`}
  }[d.kind];
  let ballHTML;
  if(d.kind==="scratch"){
    ballHTML=`<div class="ball big-ball cue"><div class="shine"></div></div>`;
  } else {
    const def=BALL[d.n];
    const style=def.t==="st"?"":`background:${def.c}`;
    const inner=(def.t==="st"?`<div class="band" style="background:${def.c}"></div>`:"")
      +`<div class="shine"></div><div class="num">${d.n}</div>`;
    const ballCls="ball big-ball"+(def.t==="st"?" stripe":"")+(d.kind==="special"?" special":"");
    ballHTML=`<div class="${ballCls}" style="${style}">${inner}</div>`;
  }
  const passHTML=d.passed?`<div class="shot-pass">ครบโควต้ายิงติดกัน → เปลี่ยนคนยิง</div>`:"";
  const btnHTML=d.choices
    ? `<button class="btn-primary" id="shotDone" style="width:100%">✓ จบการยิงครั้งนี้</button>
       <div class="spacer"></div>
       <button class="btn-ghost" id="shotMore" style="width:100%">➕ ยิงครั้งเดียวลงหลายลูก (เพิ่มอีกลูก)</button>`
    : `<button class="btn-primary" id="shotBtn">ถัดไป</button>`;
  const ov=el(`<div class="overlay shot-ov ${K.cls}"><div class="overlay-box shot-box">
    ${ballHTML}
    <div class="shot-who">ผู้ยิง: <b>${esc(d.shooterName)}</b></div>
    <div class="shot-kind">${K.icon} ${K.label}</div>
    <div class="shot-pts">${K.pts}</div>
    ${passHTML}
    ${btnHTML}
  </div></div>`);
  document.body.appendChild(ov);
  const close=(cb)=>{ if(!ov.parentNode) return; ov.remove(); after&&after(); cb&&cb(); };
  if(d.choices){
    ov.querySelector("#shotDone").addEventListener("click",()=>close(d.choices.onDone));
    ov.querySelector("#shotMore").addEventListener("click",()=>close(d.choices.onMore));
  } else {
    ov.addEventListener("click",e=>{ if(e.target===ov) close(); });
    ov.querySelector("#shotBtn").addEventListener("click",()=>close());
  }
}

function shootBall(n){
  const b=S.balls[n];
  if(b.shot) return;
  const sh=currentShooter();
  const kind = b.type==="special" ? "special"
             : b.type==="owned" ? (b.owner===sh?"own":"steal")
             : "decoy";
  const shooterName=S.players[sh].name;
  const ownerName = kind==="steal" ? S.players[b.owner].name : "";
  sfx(kind);
  speak(shotPhrase(kind, shooterName, ownerName, S.players[sh].hc));
  const msg=applyPotScore(n, sh);
  const cont = !!S._strokeOpen;            // ลูกนี้ลงพร้อมครั้งก่อน (ต่อจากลูกที่แล้วในการยิงครั้งเดียว)
  S.actions.push({n, by:sh, sameStroke:cont});
  S.log.push(`[${shooterName}] ${msg}${cont?" (ลงพร้อมครั้งก่อน)":""}`);
  const lo=applyLeftover();
  const ended=maybeAutoEnd();   // ตาจบเองอัตโนมัติเมื่อหมดโต๊ะ/เหลือแต่ลูกหลอก
  const lim=limitFor(sh);
  if(ended){
    S._strokeOpen=false;
    S._lastReveal=msg;
    renderEndReview();   // หน้าตรวจก่อนบันทึก (ยังไม่ commit) — ใส่ลูกขาว/ย้อนได้
    showShotPopup({n, kind, shooterName, ownerName, passed:false, hc:S.players[sh].hc}, ()=>{ if(lo) showLeftoverPopup(lo); });
    return;
  }
  if(lim>0){
    // จำกัดยิงติดกัน: ค้างตาผู้ยิงไว้ก่อน แล้วถามว่ายิงครั้งนี้ลงหลายลูกไหม
    S._strokeOpen=true;
    S._lastReveal=msg;
    renderShoot();
    showShotPopup({n, kind, shooterName, ownerName, passed:false, hc:S.players[sh].hc,
      choices:{
        onMore:()=>{
          S._strokeOpen=true;   // แตะลูกถัดไป = ลงพร้อมกัน นับเป็นการยิงครั้งเดียว
          S._lastReveal=`${shooterName} ยิงครั้งเดียวลงหลายลูก — แตะลูกถัดไปที่ลงพร้อมกัน`;
          renderShoot();
        },
        onDone:()=>{
          S._strokeOpen=false;  // จบครั้งนี้ -> คิดโควต้ายิงติดกัน
          const passed = currentShooter()!==sh;
          if(passed) S._lastReveal=`${msg} — ครบโควต้ายิงติดกัน เปลี่ยนคน`;
          renderShoot();
        }
      }
    }, ()=>{ if(lo) showLeftoverPopup(lo); });
  } else {
    S._strokeOpen=false;
    S._lastReveal=msg;
    renderShoot();
    showShotPopup({n, kind, shooterName, ownerName, passed:false, hc:S.players[sh].hc}, ()=>{ if(lo) showLeftoverPopup(lo); });
  }
}

/* แจกโบนัสลูกเหลือ: เมื่อลูกหลอกหมดโต๊ะแล้ว และลูกของผู้เล่นเหลือไม่เกินจำนวนไพ่
   (ไม่นับลูกพิเศษ 14/15) -> เจ้าของแต่ละลูกได้เลขละ UNIT×2 แต้มจากทุกคน (ครั้งเดียว)
   แล้วเล่นต่อยิงเก็บแต้มปกติจนหมดโต๊ะ
   คืนค่ารายการแจกแต้ม (ไว้ขึ้น popup) หรือ null ถ้ายังไม่ถึงจุดแจก */
function applyLeftover(){
  if(S.leftoverDone) return null;
  const rem=Object.values(S.balls).filter(b=>!b.shot);
  if(rem.some(b=>b.type==="decoy")) return null;       // ยังมีลูกหลอกค้าง -> รอจนหมดก่อน ค่อยแจก
  const owned=rem.filter(b=>b.type==="owned");          // นับเฉพาะลูกของผู้เล่น (ไม่นับพิเศษ 14/15)
  if(!owned.length) return null;                        // ไม่มีลูกผู้เล่นเหลือ -> ไม่แจก
  if(owned.length>S.cardsPer) return null;              // ลูกผู้เล่นยังเหลือเกินจำนวนไพ่ -> ยังไม่ถึงจุดแจก
  S.leftoverDone=true;
  const L=owned.length;
  const cnt=S.players.map(()=>0);
  owned.forEach(b=>{ b.leftover=true; cnt[b.owner]++; });
  // โบนัสลูกเหลือใช้ค่า "ต่อให้" ของเจ้าของแต่ละคน (เลขละ bonusOf(owner) จากทุกคน)
  const bonusOf=(i)=>S.players[i].hc.leftover;
  let totalBonus=0;
  owned.forEach(b=>{ totalBonus += bonusOf(b.owner); });
  // หักลบแต้มแบบ pairwise (ไม่เฉลยว่าเลขไหนเป็นของใคร)
  owned.forEach(b=>{ const bn=bonusOf(b.owner); S.players.forEach((p,j)=>transfer(b.owner,j,bn)); });
  // log: รวมต่อคน ไม่บอกเลข
  const bvals=[...new Set(owned.map(b=>bonusOf(b.owner)))];
  const perTxt=bvals.length===1?`เลขละ ${bvals[0]} แต้ม`:`เลขละตามค่าต่อให้ของเจ้าของ`;
  S.log.push(`— แจกแต้มเลขที่เหลือบนโต๊ะ ${L} ลูก (${perTxt} · ยังไม่เฉลยเลข) —`);
  S.players.forEach((p,i)=>{ if(cnt[i]>0) S.log.push(`[ลูกเหลือ] ${p.name} เหลือ ${cnt[i]} เลขบนโต๊ะ → ได้ ${cnt[i]*bonusOf(i)} แต้มจากทุกคน`); });
  // popup: ยอดสุทธิต่อคน (ใครได้/เสียเท่าไร) ยังไม่เฉลยเลข
  return S.players.map((p,i)=>({name:p.name, net: cnt[i]*bonusOf(i)*S.P - totalBonus}));
}

/* ตรวจจุดจบของตาอัตโนมัติหลังยิงแต่ละลูก */
/* โต๊ะจบหรือยัง: หมดโต๊ะ หรือเหลือแต่ลูกหลอก (ไม่มีใครอยากยิง) */
function isTableFinished(){
  const rem=Object.values(S.balls).filter(b=>!b.shot);
  if(rem.length===0) return true;
  const remOwned=rem.filter(b=>b.type==="owned").length;
  const remDecoy=rem.filter(b=>b.type==="decoy").length;
  const remSpecial=rem.filter(b=>b.type==="special").length;
  return (remOwned===0 && remSpecial===0 && remDecoy>0);
}
/* ตรวจจบโต๊ะ — แค่ตั้งธง ยังไม่ commit (ไปหน้าตรวจก่อนบันทึกแทน) */
function maybeAutoEnd(){
  if(isTableFinished()){ S.finished=true; return true; }
  return false;
}

function undoLast(){
  if(!S.actions.length) return;
  sfx("undo");
  S._strokeOpen=false;
  S.actions.pop();
  rebuildState();
  // ย้อนแล้ว: ถ้ายังจบโต๊ะอยู่ -> กลับหน้าตรวจ, ไม่งั้นกลับไปยิงต่อ
  if(isTableFinished()){ S.finished=true; renderEndReview(); }
  else { S.finished=false; S.phase="shoot"; renderShoot(); }
}

function rebuildState(){
  // reset and replay actions (turn order recomputed from position)
  S.ledger=Array.from({length:S.P},()=>Array(S.P).fill(0));
  Object.values(S.balls).forEach(b=>{b.shot=false;b.shotBy=null;b.leftover=false;});
  S.log=[]; S._lastReveal=""; S.leftoverDone=false;
  const acts=S.actions.slice(); S.actions=[];
  acts.forEach(a=>{
    // ลูกที่ลงพร้อมครั้งก่อนต้องค้างตาผู้ยิงเดิมไว้ระหว่างเล่นซ้ำ
    S._strokeOpen = !!a.sameStroke;
    const sh=currentShooter();
    if(a.miss){
      const m=(a.by!=null)?a.by:sh;
      S.actions.push({miss:true, by:m});
      S.log.push(`[${S.players[m].name}] ยิงพลาด`);
    } else if(a.scratch){
      const m=(a.by!=null)?a.by:sh;
      const msg=applyScratch(m);
      S.actions.push({scratch:true, by:m});
      S.log.push(`[${S.players[m].name}] ${msg}`);
    } else {
      const cont=!!a.sameStroke;
      const msg=applyPotScore(a.n, sh);
      S.actions.push({n:a.n, by:sh, sameStroke:cont});
      S.log.push(`[${S.players[sh].name}] ${msg}${cont?" (ลงพร้อมครั้งก่อน)":""}`);
      applyLeftover();
    }
  });
  S._strokeOpen=false;
}

/* หน้าตรวจก่อนบันทึก: ยังไม่ลง session/HOF จนกว่าจะกด "บันทึกผล"
   - แก้เคส "ยิงลูกสุดท้ายลง แต่ลูกขาวลงด้วย" -> ใส่โทษลูกขาวให้คนยิงลูกสุดท้ายได้
   - แก้เคส "กดผิดที่ลูกสุดท้าย" -> ย้อนกลับไปยิงใหม่ได้ */
function renderEndReview(){
  const A=app(); A.innerHTML="";
  S.phase="review"; S.finished=true;
  syncLive(); syncGame();
  A.appendChild(el(`<div class="card center"><h2>🏁 ตากำลังจะจบ</h2>
    <div class="muted">ตรวจ/แก้ให้เรียบร้อยก่อนกดบันทึกผล</div></div>`));
  { const ib=inviteButton(); if(ib) A.appendChild(ib); }

  const acts=S.actions;
  const last=acts[acts.length-1];
  const scratched=!!(last && last.scratch);
  // คนที่ยิงลูกสุดท้าย (ข้ามโทษลูกขาว/พลาดที่ต่อท้าย)
  let lastBy=null;
  for(let i=acts.length-1;i>=0;i--){ const a=acts[i]; if(!a.scratch && !a.miss){ lastBy=a.by; break; } }
  if(lastBy==null) lastBy = last ? last.by : currentShooter();
  const lbName = S.players[lastBy] ? S.players[lastBy].name : "";
  const sc = S.players[lastBy] ? S.players[lastBy].hc.scratch : UNIT;

  const card=el(`<div class="card">
    <button class="btn-ghost foul-btn" id="rvScratch" style="width:100%${scratched?';border-color:var(--danger);color:var(--danger)':''}">
      ${scratched
        ? `✔ ใส่โทษลูกขาวแล้ว — ${esc(lbName)} เสีย ${sc} แต้ม/คน · กดเพื่อยกเลิก`
        : `⚪ ลูกขาวลงด้วย — ปรับ ${esc(lbName)} เสีย ${sc} แต้ม/คน`}
    </button>
    <div class="spacer"></div>
    <button class="btn-ghost" id="rvUndo" style="width:100%">↩ กดผิด — ย้อนกลับไปแก้ลูกสุดท้าย</button>
  </div>`);
  A.appendChild(card);

  A.appendChild(renderScoreCard());

  const doneCard=el(`<div class="card">
    <button class="btn-primary" id="rvDone" style="width:100%">✅ จบตา · บันทึกผล</button>
    <div class="hint" style="text-align:center;margin-top:8px;color:var(--accent)">ผลจะยังไม่ถูกบันทึกจนกว่าจะกดปุ่มนี้</div>
  </div>`);
  A.appendChild(doneCard);

  if(S.log.length){
    A.appendChild(el(`<div class="card"><h2>บันทึกทั้งตา</h2><div class="log">${logHTML(S.log)}</div></div>`));
  }

  // ยกเลิก/โล๊ะตานี้
  { const ac=el(`<div class="card"></div>`); ac.appendChild(abandonButton()); A.appendChild(ac); }

  card.querySelector("#rvScratch").addEventListener("click",()=>{
    if(scratched){
      S.actions.pop(); rebuildState(); renderEndReview();
    } else {
      sfx("scratch");
      speak(shotPhrase("scratch", lbName, "", S.players[lastBy].hc));
      S.actions.push({scratch:true, by:lastBy});
      rebuildState(); renderEndReview();
    }
  });
  card.querySelector("#rvUndo").addEventListener("click",()=>{
    // เอาโทษลูกขาวที่เพิ่งใส่ออกก่อน (ถ้ามี) แล้วถอยลูกสุดท้ายออก กลับไปหน้ายิง
    if(S.actions.length && S.actions[S.actions.length-1].scratch) S.actions.pop();
    if(S.actions.length) S.actions.pop();
    S._strokeOpen=false; S.finished=false; S.phase="shoot";
    rebuildState();
    renderShoot();
  });
  doneCard.querySelector("#rvDone").addEventListener("click",endRound);
}

function endRound(){
  S.finished=true; S.phase="result";
  sfx("end");

  // per-ตา shot tallies (โบนัสลูกเหลือนับแยกจากการยิงปกติ)
  const tally=S.players.map(()=>({own:0,steal:0,special:0,decoy:0,leftover:0}));
  Object.values(S.balls).forEach(b=>{
    if(b.leftover && b.owner!=null) tally[b.owner].leftover++;
    if(!b.shot || b.shotBy==null) return;
    const by=b.shotBy;
    if(b.type==="special") tally[by].special++;
    else if(b.type==="decoy") tally[by].decoy++;
    else if(b.type==="owned"){ if(b.owner===by) tally[by].own++; else tally[by].steal++; }
  });
  // สถิติลูกเล่นต่อตา: ฟาวล์/พลาด/คอมโบ/โดนแย่ง/นักปิดเกม
  const scr=S.players.map(()=>0), mis=S.players.map(()=>0),
        combo=S.players.map(()=>0), victim=S.players.map(()=>0);
  let runSize=0, runBy=null;
  S.actions.forEach(a=>{
    if(a.scratch){ if(a.by!=null) scr[a.by]++; runSize=0; runBy=null; return; }
    if(a.miss){ if(a.by!=null) mis[a.by]++; runSize=0; runBy=null; return; }
    // ยิงลง: ลูกที่ลงพร้อมครั้งก่อน (sameStroke) นับต่อเป็นคอมโบเดียวกัน
    if(a.sameStroke && runBy===a.by){ runSize++; } else { runSize=1; runBy=a.by; }
    if(a.by!=null && runSize>combo[a.by]) combo[a.by]=runSize;
  });
  // นักปิดเกม: คนยิงลูกจริงลูกสุดท้าย (ข้ามฟาวล์/พลาดที่ต่อท้าย)
  let closer=null;
  for(let i=S.actions.length-1;i>=0;i--){ const a=S.actions[i]; if(!a.scratch && !a.miss){ closer=a.by; break; } }
  // น้ำตาตกใน: ลูกตัวเองโดนคนอื่นยิง
  Object.values(S.balls).forEach(b=>{
    if(b.shot && b.type==="owned" && b.owner!=null && b.shotBy!=null && b.shotBy!==b.owner) victim[b.owner]++;
  });

  const nets=S.players.map((p,i)=>netOf(i));
  const maxNet=Math.max(...nets);
  const allTied=nets.every(n=>n===maxNet);
  const results=S.players.map((p,i)=>({
    name:p.name, net:nets[i], win:!allTied && nets[i]===maxNet, ...tally[i],
    scratches:scr[i], misses:mis[i], bestCombo:combo[i], victim:victim[i], closes:(closer===i?1:0)
  }));
  // session pairwise delta (by name)
  const pairDelta={};
  for(let i=0;i<S.P;i++)for(let j=0;j<S.P;j++){
    if(i===j) continue;
    const a=S.players[i].name, b=S.players[j].name;
    pairDelta[a]=pairDelta[a]||{}; pairDelta[a][b]=(pairDelta[a][b]||0)+S.ledger[i][j];
  }
  recordRoundResult(results, pairDelta);
  renderResult();
}

    <div class="spacer"></div>
    <button class="btn-ghost" id="goHome" style="width:100%">🏠 กลับหน้าตั้งวง</button>
  </div>`);
  A.appendChild(nav);
  nav.querySelector("#goSes").addEventListener("click",()=>{ S=null; entryGateOpen=false; clearCloudGame(); homeTab="session"; renderSetup(); });
  nav.querySelector("#goHome").addEventListener("click",()=>{ S=null; entryGateOpen=false; clearCloudGame(); homeTab="play"; renderSetup(); });
}

/* ---------------- boot ---------------- */
(function initMute(){
  const btn=document.getElementById("muteBtn");
  const sync=()=>{ btn.textContent=_muted?"🔇":"🔊"; btn.classList.toggle("off",_muted); };
  sync();
  btn.addEventListener("click",()=>{ setMuted(!_muted); sync(); if(_muted){ try{speechSynthesis.cancel();}catch(e){} } else { _tvSoundOn=true; sfx("own"); } });
})();
/* boot ฝั่ง controller (มือถือ) — รองรับการเข้าร่วมคุมเกมผ่านลิงก์ #join */
async function controllerBoot(){
  // 1) เข้าร่วมผ่านลิงก์ที่สแกนมา (#join=gameId.key)
  const m=(location.hash||"").match(/join=([^.]+)\.(.+)$/);
  if(m && _subtle){
    try{
      _gameId=decodeURIComponent(m[1]);
      _gameKeyB64=decodeURIComponent(m[2]);
      _gameKey=await importGameKey(_gameKeyB64);
      lsSet(K_CTRL, {gameId:_gameId, keyB64:_gameKeyB64});
    }catch(e){ console.warn("join import failed", e); _gameId=null; _gameKey=null; _gameKeyB64=null; }
    try{ history.replaceState(null,"", location.pathname+location.search); }catch(e){}
  } else {
    await restoreCtrlKey();   // กู้กุญแจของตาที่เคยคุมไว้ (เครื่องคนคุมรีเฟรช)
  }
  renderSetup();   // แสดงข้อมูลในเครื่องทันที
  await cloudBoot();   // sync ข้อมูลกลุ่ม (ชื่อ/รอบนี้/HOF)
  // 2) มีกุญแจ + มีตา active บนคลาวด์ -> ดึงสถานะเกมมาคุมต่อทันที
  if(_gameKey && _gameId && _cloudOK){
    try{
      const snap=await _cloudDoc.get();
      const g=snap.exists ? snap.data().game : null;
      if(g && g.active && g.id===_gameId && g.iv){ _lastGameTs=0; await applyRemoteGame(g); }
      else if(!g || !g.active){ clearCloudGame(); }   // ตาจบไปแล้ว -> ทิ้งกุญแจเก่า
    }catch(e){ console.warn("adopt game failed", e); }
  }
}
if(TV_MODE){
  tvBoot();        // โหมดทีวี: อ่านอย่างเดียว แสดงกระดานสด + อันดับ
} else {
  controllerBoot();
}
</script>
